name: MADO
options:
  bundleIdPrefix: com.imaiissatsu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  defaultConfig: Release
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: WM7939G226
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    GENERATE_INFOPLIST_FILE: true
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"
    SWIFT_EMIT_LOC_STRINGS: true
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.0.0"

targets:
  MADO:
    type: application
    platform: iOS
    sources:
      - path: MADO
        excludes:
          - "Resources/**"
      - path: MADO/Resources/Assets.xcassets
        buildPhase: resources
      - path: MADO/Resources/Localizable.xcstrings
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: MADO/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.imaiissatsu.mado
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE: false
        MTL_FAST_MATH: true
    dependencies:
      - package: GRDB
        product: GRDB
    entitlements:
      path: MADO/Resources/MADO.entitlements
      properties: {}
